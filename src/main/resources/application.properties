spring.application.name=openmodel_langchain_demo
server.servlet.context-path=/banking-assistant

assistant.name=Banking Assistant

# DevTools hot reload / restart
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java,src/main/resources

# LangChain4j + Ollama (Spring Boot starter)
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3.1:8b
langchain4j.ollama.chat-model.temperature=0.2
langchain4j.ollama.chat-model.timeout=PT60S

# Optional embeddings model (for RAG/memory extensions)
#langchain4j.ollama.embedding-model.base-url=http://localhost:11434
#langchain4j.ollama.embedding-model.model-name=nomic-embed-text

